<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: black;

            background: rgb(51, 154, 65);
            background: radial-gradient(circle, rgba(51, 154, 65, 1) 36%, rgb(0, 0, 0) 62%);
            background-size: cover;
            background-repeat: repeat/repeat-x;
            background-image: url(hexagonal-technology-background.png);

        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.9rem;
            font-size: 0.9rem;
            gap: 1rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding-left: 80px;
            padding-right: 80px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(245, 246, 250, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #f5f6fa;
        }

        .register-link {
            text-align: center;
            font-size: 0.9rem;
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .register-link a:hover {
            opacity: 0.8;
        }

        .btn-social:hover {
            background: rgba(245, 246, 250, 0.2);
            transform: translateY(-2px);
        }

        .btn-social i {
            font-size: 1.2rem;
        }

        .btn-google {
            color: #4285F4;
        }

        .btn-facebook {
            color: #4267B2;
        }

        .btn-discord {
            color: #5865F2;
        }

        .remember-me input {
            width: auto;
        }

        .forgot {
            color: #a29bfe;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot:hover {
            color: #00cec9;
        }


        /* Mobile styles */
        body {
            font-size: 14px;
        }

        /* Tablet styles */
        @media (min-width: 600px) {
            body {
                font-size: 16px;
            }
        }

        /* Desktop styles */
        @media (min-width: 1024px) {
            body {
                font-size: 18px;
            }
        }







        /* old */
        .sidebar {
            height: 100%;
            width: 250px;
            /* Width of the sidebar */
            position: fixed;
            /* Stay in place */
            z-index: 1;
            /* Sit on top */
            top: 0;
            /* Stay at the top */
            right: -250px;
            /* Hide the sidebar initially */
            /* Black background */
            overflow-x: hidden;
            /* Disable horizontal scroll */
            transition: right 0.5s;
            /* Transition effect */
            padding-top: 60px;
            /* Space for the top */
        }

        #main {
            transition: margin-right 0.5s;
            /* Transition effect for main content */
            padding: 16px;
            /* Padding for main content */
        }

        .sidebar a {
            padding: 10px 15px;
            /* Padding for links */
            text-decoration: none;
            /* No underline */
            font-size: 25px;
            /* Font size */
            color: rgb(57, 199, 44);
            /* White text color */
            display: block;
            /* Make links block elements */
            transition: 0.3s;
            /* Transition effect */
        }

        .openbtn {
            font-size: 20px;
            /* Button font size */
            cursor: pointer;
            /* Pointer cursor */
            /* Button background */
            /* Button text color */
            border: none;
            /* No border */
            /* Button padding */
            position: fixed;
            top: 4%;
            right: 3%;
            background-color: #3dd41f;
        }

        .openbtn:hover {
            background-color: #3dd41f;
            color: #000000;
        }

        .openbtn {
            color: white;
            background-color: #000000;
        }

        .sidebar a:hover {
            background-color: #3dd41f;
            color: black;
            border-radius: 10px;
            /* Darker background on hover */
        }

        .sidebar .closebtn {
            font-size: 36px;
            /* Close button size */
            position: absolute;
            /* Position it at the top right */
            right: 25px;
            /* Right padding */
            top: 10px;
            /* Top padding */
        }



        .header {
            display: flex;
            /* Use Flexbox to align items */
            justify-content: space-between;
            /* Space between heading and nav */
            align-items: center;
            /* Center items vertically */
            top: 0%;
        }

        h1.main {
            color: rgb(25, 219, 19);
            justify-self: left;
            font-family: cursive;
            width: 15.5ch;
            text-wrap: nowrap;
            overflow: hidden;
            animation: typing 2s steps(20) infinite alternate-reverse;

            font-size: xx-large;
        }

        @keyframes typing {
            from {
                width: 0ch;
            }
        }


        h2.login {
            color: rgb(25, 219, 19);
            justify-self: center;
            font-family: sans-serif;
            font-size: xx-large;

        }

        /*background: rgb(0,0,0);
font-size: pt; ==> for font sizing
background: linear-gradient(180deg, rgba(0,0,0,1) 36%, rgba(48,189,67,1) 65%);*/

        /* styles.css */


        .form {
            --bg-light: #efefef;
            --bg-dark: #707070;
            --clr: #38c738;
            --clr-alpha: #9c9c9c60;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 300px;
            justify-self: center
        }

        .fieldset {
            border: 2px solid rgb(64, 223, 59);
            padding-top: 50px;
            padding-left: 70px;
            padding-bottom: 50px;
            padding-right: 80px;
            box-shadow: 100px #707070;
            border-radius: 50px;
            background-color: black;
            justify-self: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5),
                /* Neon glow */
                0 0 60px rgba(0, 255, 0, 0.5);



        }

        .form .input-span {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form input[type="email"],
        .form input[type="password"] {
            border-radius: 0.5rem;
            padding: 1rem 0.75rem;
            width: 100%;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--clr-alpha);
            outline: 2px solid var(--bg-dark);
        }

        .form input[type="email"]:focus,
        .form input[type="password"]:focus {
            outline: 2px solid var(--clr);
        }

        .label {
            align-self: flex-start;
            color: var(--clr);
            font-weight: 600;
        }

        .form .submit {
            padding: 1rem 0.75rem;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 3rem;
            background-color: var(--bg-dark);
            color: var(--bg-light);
            border: none;
            cursor: pointer;
            transition: all 300ms;
            font-weight: 600;
            font-size: 0.9rem;
            color: rgb(0, 0, 0);
        }

        .form .submit:hover {
            background-color: rgb(35, 224, 35);
            color: rgb(0, 0, 0);
        }

        .span {
            text-decoration: none;
            color: var(--bg-dark);
        }

        .span a {
            color: var(--clr);
        }
    </style>
</head>

<body>

    <header class="header">
        <h1 class="main">NEXUS GAMING
        </h1>

        <div class="sidebar" id="sidebar">
            <a href="login.html" class="active">Home</a>
            <a href="#">About</a>
            <a href="contact.html">Contact</a>
            <a href="SIGNUP.html">signup</a>
            <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">×</a>
        </div>

        <div id="main" align="left">
            <button class="openbtn" onclick="openSidebar()">☰</button>


            <script src="login.js">
                // script.js
                function openSidebar() {
                    // Show the sidebar by setting its right position to 0
                    document.getElementById("sidebar").style.right = "0";
                    // Shift the main content to the right to make space for the sidebar
                    document.getElementById("main").style.marginRight = "250px";
                }

                function closeSidebar() {
                    // Hide the sidebar by moving it out of view
                    document.getElementById("sidebar").style.right = "-250px";
                    // Reset the main content margin to its original position
                    document.getElementById("main").style.marginRight = "0"; // Corrected casing
                }
                document.getElementById('form').addEventListener('submit', function (event) {
                    event.preventDefault(); // Prevent the default form submission

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    // Simple validation (you can expand this)
                    if (email === '' || password === '') {
                        alert('Please fill in all fields.');
                    } else {
                        // Here you can handle the login logic (e.g., send data to the server)
                        alert('Login successful!'); // Placeholder for successful login
                    }
                });
            </script>

    </header>
    <fieldset class="fieldset">
        <legend>
            <h2 class="login">LOGIN</h2>
        </legend>

        <form class="form">
            <span class="input-span">
                <label for="email" class="label">Email / Username</label>
                <input type="email" name="email" id="email" placeholder="email" required /></span>
            <span class="input-span">
                <label for="password" class="label">Password</label>
                <input type="password" name="password" id="password" placeholder="password" required /></span>
            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="color: rgb(42, 206, 42);">Remember me</label>
                </div>
                <a href="forgot.html" class="forgot">Forgot password?</a>
            </div>
            <input class="submit" type="submit" value="Log in" />
            <div class="divider">
                OR CONTINUE WITH
            </div>

            <div class="social-login">
                <button type="button" class="btn-social btn-google">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button type="button" class="btn-social btn-facebook">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>

            </div>

            <span class="span">Don't have an account? <a href="SIGNUP.html">Sign up</a></span><br><br>
            <div id="txt" style="color: rgb(173, 163, 163);">&copy; Created By TI & Co.</div>
        </form>
    </fieldset>
</body>

</html>
